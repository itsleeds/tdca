on:
  push:
    branches: [main]
  workflow_dispatch:

name: Quarto Publish

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Detect project requirements
        id: detect
        run: |
          NEED_R=false
          NEED_PYTHON=false
          FORMATS=""
          ENGINES=""

          shopt -s globstar 2>/dev/null || true

          for f in *.qmd **/*.qmd; do
            [ -f "$f" ] || continue
            F=$(quarto inspect "$f" 2>/dev/null | jq -r '.formats // empty | keys[]' 2>/dev/null)
            FORMATS="$FORMATS $F"
            E=$(quarto inspect "$f" 2>/dev/null | jq -r '.engines // empty | .[]' 2>/dev/null)
            ENGINES="$ENGINES $E"
          done

          echo "Formats found: $FORMATS"
          echo "Engines found: $ENGINES"

          if echo "$ENGINES" | grep -qF "knitr"; then
            NEED_R=true
          fi
          if echo "$ENGINES" | grep -qF "jupyter"; then
            NEED_PYTHON=true
          elif echo "$ENGINES" | grep -qF "markdown"; then
            NEED_PYTHON=false
          fi

          echo "need_r=$NEED_R" >> "$GITHUB_OUTPUT"
          echo "need_python=$NEED_PYTHON" >> "$GITHUB_OUTPUT"

      - name: Install R
        if: steps.detect.outputs.need_r == 'true'
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.1'
          use-public-rspm: true
      - name: Install R dependencies
        if: steps.detect.outputs.need_r == 'true'
        run: |
          if [ -f renv.lock ]; then
            Rscript -e 'renv::restore()'
          else
            Rscript -e 'install.packages(c("sf", "tidyverse"), repos = "https://cran.rstudio.com/")'
          fi

      - name: Set up Python
        if: steps.detect.outputs.need_python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install Python dependencies
        if: steps.detect.outputs.need_python == 'true'
        run: |
          pip install -r requirements.txt 2>/dev/null || pip install pandas geopandas

      - name: Render site
        run: quarto render

      - name: Add .nojekyll
        run: touch docs/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4